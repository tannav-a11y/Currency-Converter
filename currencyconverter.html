<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
      <link rel="stylesheet" href="currencycoverter.css">
</head>
<body>
       <div class="container">
      <h2>Currency Converter</h2>
      <form>
        <div class="amount">
          <p>Enter Amount</p>
          <input value="1" type="text" />
        </div>
        <div class="dropdown">
          <div class="from">
            <p>From</p>
            <div class="select-container">
              <img class="1stcount" src="" />
              <select name="from"><option>Select</option></select>
            </div>
          </div>
        
          <p class="emoji">💱</p>
          <div class="to">
            <p>To</p>
            <div class="select-container">
              <img class="count1"src="" />
              <select name="to"><option>Select</option></select>
            </div>
          </div>
        </div>
        <div class="msg"></div>
        <button>Get Exchange Rate</button>
      </form>
    </div>
     <script src="code.js"></script>
    <script src="currencyconverter.js"></script>
</body>
</html>
